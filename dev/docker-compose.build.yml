# docker-compose.build.yml
# Use this file for local development and building images
# Run with: docker compose -f docker-compose.build.yml up --build

# Requires environment variables from .env (see .env.example)
services:
  db:
    image: postgres:18-alpine
    container_name: karaoke-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        --locale=C
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_connections=100
      -c log_min_duration_statement=-1
      -c log_checkpoints=off
      -c autovacuum=on
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
    volumes:
      - ${DB_PATH}:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .src/server
      dockerfile: Dockerfile
    container_name: karaoke-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MEDIA_ROOT: ${MEDIA_ROOT}
      ORIGIN: ${ORIGIN}
      WEB_APP_URL: ${WEB_APP_URL}
      PORT: ${PORT}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "${MEDIA_PATH}:/media/local:ro"
      - "${DOWNLOAD_PATH}:/media/downloads"
      - "${BREAK_PATH}:/media/music:ro"
    restart: always
    ports:
      - "5174:5174"
    command: ["sh", "-c", "npm run migrate && npm start"]

  web:
    build:
      context: .src/web
      dockerfile: Dockerfile
    container_name: karaoke-web
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    depends_on:
      api:
        condition: service_healthy
    restart: always
    ports:
      - "5173:5173"
