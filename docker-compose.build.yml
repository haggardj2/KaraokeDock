# docker-compose.build.yml
# Use this file for local development and building images
# Run with: docker compose -f docker-compose.build.yml up --build

# Requires environment variables from .env (see .env.example)
services:
  db:
    image: postgres:18
    container_name: karaoke-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        --locale=C
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_connections=100
      -c log_min_duration_statement=100
      -c autovacuum=on
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
    volumes:
      - ${DB_PATH}:/var/lib/postgresql
    restart: always
    ports:
      - "5432:5432"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: karaoke-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MEDIA_ROOT: ${MEDIA_ROOT}
      ORIGIN: ${ORIGIN}
      WEB_APP_URL: ${WEB_APP_URL}
      PORT: ${PORT}
    depends_on:
      - db
    restart: always
    volumes:
      - ${MEDIA_PATH}:/media/local
    ports:
      - "5174:5174"
    command: ["sh", "-c", "npm run migrate && npm start"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: karaoke-web
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    depends_on:
      - api
    restart: always
    ports:
      - "5173:5173"