# docker-compose.build.yml
# Use this file for local development and building images
# Run with: docker compose -f docker-compose.build.yml up --build

services:
  db:
    image: postgres:18
    container_name: karaoke-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-karaoke}
      POSTGRES_USER: ${POSTGRES_USER:-karaoke}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-karaoke}
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        --locale=C
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_connections=100
      -c log_min_duration_statement=100
      -c autovacuum=on
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
    volumes:
      - ${DB_PATH}:/var/lib/postgresql
    restart: always
    ports:
      - "5432:5432"

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: ${KARAOKE_API_IMAGE:-haggardj2/karaoke-api:beta}
    container_name: karaoke-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://karaoke:karaoke@db:5432/karaoke}
      MEDIA_ROOT: ${MEDIA_ROOT:-/media}
      ORIGIN: ${ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:5173}
      PORT: ${PORT:-5174}
    depends_on:
      - db
    restart: always
    volumes:
      - ${MEDIA_PATH:-./media}:/media/local
    ports:
      - "5174:5174"
    command: ["sh", "-c", "npm run migrate && npm start"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: ${KARAOKE_WEB_IMAGE:-haggardj2/karaoke-web:beta}
    container_name: karaoke-web
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:5174}
    depends_on:
      - api
    restart: always
    ports:
      - "5173:5173"

volumes:
  dbdata:
