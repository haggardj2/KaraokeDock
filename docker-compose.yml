services:
  db:
    image: postgres:18-alpine
    container_name: karaokedock-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        --locale=C
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_connections=100
      -c log_min_duration_statement=-1
      -c log_checkpoints=off
      -c autovacuum=on
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
    volumes:
      - ${DB_PATH}:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  app:
    image: haggardj2/karaokedock:latest
    container_name: karaokedock
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MEDIA_ROOT: ${MEDIA_ROOT}
      ORIGIN: ${ORIGIN}
      WEB_APP_URL: ${WEB_APP_URL}
      TRUST_PROXY: ${TRUST_PROXY:-1}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "${KARAOKE_PATH}:/media/karaoke:ro"
      - "${DOWNLOADS_PATH}:/media/downloads"
      - "${BREAKMUSIC_PATH}:/media/breakmusic:ro"
    restart: always
    ports:
      - "${APP_PORT:-5173}:5173"
