services:
  db:
    image: postgres:16-alpine
    container_name: karaoke-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        --locale=C
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c max_connections=100
      -c log_min_duration_statement=100
      -c autovacuum=on
      -c autovacuum_vacuum_scale_factor=0.1
      -c autovacuum_analyze_scale_factor=0.05
    volumes:
      - ${DB_PATH}
    restart: unless-stopped


  api:
    image: haggardj2/karaoke-api:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEDIA_ROOT: ${MEDIA_ROOT}
      ORIGIN: ${ORIGIN}
      WEB_APP_URL: ${WEB_APP_URL}
      PORT: ${PORT}
    depends_on:
      - db
    volumes:
      - ${MEDIA_PATH}
    ports:
      - "5174:5174"
    command: ["sh", "-c", "npm run migrate && npm start"]

  web:
    image: haggardj2/karaoke-web:latest
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  dbdata:
    # This creates a Docker volume. To mount a host directory instead,
    # comment out this section and use a bind mount in the api service above

